name: Update US Closing Prices

on:
  schedule:
    - cron: '40 22 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: us-closing-prices
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Update quote cache
        run: npm run quotes:update

      - name: Commit quote cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/us-closes.json
          if git diff --cached --quiet; then
            echo "No quote changes to commit."
          else
            git commit -m "Update US closing price cache"
            git push
          fi
